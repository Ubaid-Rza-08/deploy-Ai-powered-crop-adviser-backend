apiVersion: v1
kind: Service
metadata:
  name: agriculture-service
  namespace: gemini-crop-adviser
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "elb"
spec:
  type: LoadBalancer
  selector:
    app: agriculture-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
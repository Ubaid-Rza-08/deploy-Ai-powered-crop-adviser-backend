version: "3.8"

services:
  # --- Infrastructure ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.3
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - agriculture-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.3
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - agriculture-network
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    networks:
      - agriculture-network

  # --- Agriculture Services (Using Docker Hub Images) ---
  farmer-service:
    image: ubaidrza/farmer:v1  # Updated image name
    container_name: farmer-service
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - agriculture-network
    restart: unless-stopped

  producer-service:
    image: ubaidrza/producer:v1  # Updated image name
    container_name: producer-service
    ports:
      - "8081:8081"
    depends_on:
      - kafka
    networks:
      - agriculture-network
    restart: unless-stopped

  ai-service:
    image: ubaidrza/ai-service:v1  # Updated image name
    container_name: ai-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
    networks:
      - agriculture-network
    restart: unless-stopped

# --- Global Configurations ---
networks:
  agriculture-network:
    driver: bridge
    name: agriculture-management-network

volumes:
  redis_data:
    driver: local
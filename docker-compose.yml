services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - agriculture-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.3
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agriculture-network
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - agriculture-network
    restart: unless-stopped

  # ─── Spring Boot Services ────────────────────────────────────────────────────

  farmer-service:
    build:
      context: ./Agriculture
      dockerfile: Dockerfile
    container_name: farmer-service
    ports:
      - "${FARMER_PORT}:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_MS: ${JWT_ACCESS_TOKEN_MS}
      JWT_REFRESH_TOKEN_MS: ${JWT_REFRESH_TOKEN_MS}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      OTP_EXPIRATION_MINUTES: ${OTP_EXPIRATION_MINUTES}
      SMS_MOCK_ENABLED: ${SMS_MOCK_ENABLED}
    depends_on:
      - redis
    networks:
      - agriculture-network
    restart: unless-stopped

  producer-service:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer-service
    ports:
      - "${PRODUCER_PORT}:8081"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - agriculture-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "${AI_SERVICE_PORT}:8082"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_URL: ${GEMINI_API_URL}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_API_URL: ${ELEVENLABS_API_URL}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - agriculture-network
    restart: unless-stopped

  # ─── React Frontend ──────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./dharti-mitra-frontend
      dockerfile: Dockerfile
    container_name: dharti-mitra-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - farmer-service
      - producer-service
      - ai-service
    networks:
      - agriculture-network
    restart: unless-stopped

networks:
  agriculture-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
name: CI/CD → AWS EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: gemini-crop-adviser
  NAMESPACE: gemini-crop-adviser
  DOCKER_USERNAME: ubaidrza

jobs:
  # ─── Job 1: Build & Push all Docker images to Docker Hub ─────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Agriculture Service ──────────────────────────────────────────────────
      - name: Build & Push agriculture-service
        uses: docker/build-push-action@v5
        with:
          context: ./Agriculture
          dockerfile: ./Agriculture/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/gemini-agriculture:latest

      # ── Producer Service ─────────────────────────────────────────────────────
      - name: Build & Push producer-service
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          dockerfile: ./producer/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/gemini-producer:latest

      # ── AI Service ───────────────────────────────────────────────────────────
      - name: Build & Push ai-service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          dockerfile: ./ai-service/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/gemini-ai-service:latest

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dharti-mitra-frontend
          dockerfile: ./dharti-mitra-frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/gemini-frontend:latest

  # ─── Job 2: Deploy to AWS EKS ─────────────────────────────────────────────
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Apply namespace and configmap
        run: |
          kubectl apply -f k8s/common/namespace.yml
          kubectl apply -f k8s/common/configmap.yml

      - name: Create / update Kubernetes secrets
        run: |
          kubectl create secret generic gemini-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=DB_URL="${{ secrets.DB_URL }}" \
            --from-literal=DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=TWILIO_PHONE_NUMBER="${{ secrets.TWILIO_PHONE_NUMBER }}" \
            --from-literal=TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" \
            --from-literal=TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
            --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --from-literal=ELEVENLABS_API_KEY="${{ secrets.ELEVENLABS_API_KEY }}" \
            --from-literal=ELEVENLABS_VOICE_ID="${{ secrets.ELEVENLABS_VOICE_ID }}" \
            --save-config \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy agriculture-service
        run: |
          kubectl apply -f k8s/agriculture/
          kubectl rollout status deployment/agriculture-service \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Deploy producer-service
        run: |
          kubectl apply -f k8s/producer/
          kubectl rollout status deployment/producer-service \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Deploy ai-service
        run: |
          kubectl apply -f k8s/ai-service/
          kubectl rollout status deployment/ai-service \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Deploy frontend
        run: |
          kubectl apply -f k8s/frontend/
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Print all LoadBalancer URLs
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🌐 Live Service URLs (AWS ELB)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "⏳ Waiting for ELBs to be assigned (up to 60s)..."
          sleep 60
          echo ""

          FRONTEND=$(kubectl get svc frontend -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          AGRICULTURE=$(kubectl get svc agriculture-service -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          PRODUCER=$(kubectl get svc producer-service -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          AI=$(kubectl get svc ai-service -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)

          echo "  🌿 Frontend         → http://${FRONTEND}"
          echo "  🔐 Agriculture Svc  → http://${AGRICULTURE}:8080"
          echo "  📡 Producer Svc     → http://${PRODUCER}:8081"
          echo "  🤖 AI Service       → http://${AI}:8082"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Show pod status
        run: |
          echo ""
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo ""
          kubectl get svc -n ${{ env.NAMESPACE }}